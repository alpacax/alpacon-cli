name: Build and Test
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"

  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

  workflow_call:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Allow Go toolchain auto-download
        run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build -v .

      - name: Run Tests
        run: go test -race -v ./...
