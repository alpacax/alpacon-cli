name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions: {}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Create GitHub Release with auto notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping."
            exit 0
          fi
          # Tags with a SemVer pre-release suffix (e.g. v1.2.3-rc1, v1.2.3-beta.1)
          # are published as prereleases so they don't surface as the latest
          # release to end users.
          prerelease_flag=""
          case "${GITHUB_REF_NAME}" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" --generate-notes ${prerelease_flag}

  build-and-test:
    needs: [create-release]
    permissions:
      contents: read
    uses: ./.github/workflows/build-and-test.yaml

  goreleaser:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x

      - name: Allow Go toolchain auto-download
        run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v1"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

      - name: Strip "v" prefix from tag
        run: echo "TAG_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }} 

      - name: Upload AMD64 DEB artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.deb
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_amd64.deb

      - name: Upload AMD64 RPM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm

      - name: Upload ARM64 DEB artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.deb
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_arm64.deb

      - name: Upload ARM64 RPM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm

  packagecloud-deploy:
    needs: [goreleaser]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Strip "v" prefix from tag
        run: echo "TAG_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }} 

      - name: Download AMD64 DEB Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.deb

      - name: Download AMD64 RPM Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm

      - name: Download ARM64 DEB Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.deb

      - name: Download ARM64 RPM Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm

      - name: Upload AMD64 DEB to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_amd64.deb
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: any/any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Upload AMD64 RPM to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: rpm_any/rpm_any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Upload ARM64 DEB to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_arm64.deb
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: any/any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Upload ARM64 RPM to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: rpm_any/rpm_any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}
