name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions: {}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Create draft GitHub Release with auto notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping."
            exit 0
          fi
          # Create as a draft to hide it until all jobs succeed (publish-release makes it public).
          # Pre-release tags (e.g. v1.2.3-rc1) are published as prereleases so they aren't shown as latest.
          prerelease_flag=""
          case "${GITHUB_REF_NAME}" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" --draft --generate-notes ${prerelease_flag}

  build-and-test:
    needs: [create-release]
    permissions:
      contents: read
    uses: ./.github/workflows/build-and-test.yaml

  goreleaser:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x

      - name: Allow Go toolchain auto-download
        run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # GoReleaser needs write access to two repositories with a single
      # token: this repo (to attach release assets) and homebrew-alpacon
      # (to push the updated Formula commit into the tap). The built-in
      # `secrets.GITHUB_TOKEN` is scoped to this repo only, so we mint a
      # cross-repo installation token from the alpacax-release-publisher
      # GitHub App instead.
      - name: Generate App token
        id: release-publisher-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PUBLISHER_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PUBLISHER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            alpacon-cli
            homebrew-alpacon
          # Pin the minted installation token to the single permission
          # GoReleaser actually needs. If the App's installation
          # permissions are expanded in the future for another use case,
          # this step continues to issue a contents-only token.
          permission-contents: write

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v1"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.release-publisher-token.outputs.token }}

      - name: Strip "v" prefix from tag
        run: echo "TAG_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }} 

      - name: Upload AMD64 DEB artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.deb
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_amd64.deb

      - name: Upload AMD64 RPM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm

      - name: Upload ARM64 DEB artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.deb
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_arm64.deb

      - name: Upload ARM64 RPM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm
          path: dist/alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm

  packagecloud-deploy:
    needs: [goreleaser]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Strip "v" prefix from tag
        run: echo "TAG_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }} 

      - name: Download AMD64 DEB Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.deb

      - name: Download AMD64 RPM Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm

      - name: Download ARM64 DEB Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.deb

      - name: Download ARM64 RPM Artifacts
        uses: actions/download-artifact@v7
        with:
          name: alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm

      - name: Upload AMD64 DEB to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_amd64.deb
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: any/any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Upload AMD64 RPM to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_amd64.rpm
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: rpm_any/rpm_any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Upload ARM64 DEB to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_arm64.deb
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: any/any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Upload ARM64 RPM to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          PACKAGE-NAME: alpacon_${{ env.TAG_NAME }}_linux_arm64.rpm
          PACKAGECLOUD-USERNAME: alpacax
          PACKAGECLOUD-REPO: alpacon
          PACKAGECLOUD-DISTRIB: rpm_any/rpm_any
          PACKAGECLOUD-TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

  publish-release:
    name: Publish GitHub Release
    needs: [packagecloud-deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft Release to public
        env:
          # gh reads GH_REPO (not GITHUB_REPOSITORY), so gh resolves the repo
          # without an actions/checkout step.
          GH_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Every build/test/publish job has succeeded, so flip the draft
          # Release public. Pre-release tags (e.g. v1.2.3-rc1) must not become
          # the latest release shown to end users.
          latest_flag="--latest"
          case "${GITHUB_REF_NAME}" in
            *-*) latest_flag="--latest=false" ;;
          esac
          # --draft=false is idempotent: re-running after a previously published
          # Release leaves it public, so retries on the same tag are safe.
          gh release edit "${GITHUB_REF_NAME}" --draft=false ${latest_flag}
