project_name: alpacon

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: alpacon
    binary: alpacon
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w -X github.com/alpacax/alpacon-cli/utils.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - 386
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: 386
      - goos: windows
        goarch: 386

checksum:
  name_template: '{{ .ProjectName }}-{{ trimprefix .Version "v" }}-checksums.sha256'

archives:
  - name_template: '{{ .ProjectName }}-{{ trimprefix .Version "v" }}-{{ .Os }}-{{ .Arch }}'
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: alpacon-cli
    repository:
      owner: alpacax
      name: homebrew-alpacon
    commit_author:
      name: alpacaxbot
      email: support@alpacax.com
    directory: Formula
    homepage: "https://github.com/alpacax/alpacon-cli"
    description: "Alpacon CLI"

dockers:
  - goos: linux
    goarch: amd64
    ids:
      - alpacon
    image_templates:
      - "alpacax/alpacon-cli:latest"
      - 'alpacax/alpacon-cli:{{ trimprefix .Tag "v" }}'
    dockerfile: Dockerfile

nfpms:
  - package_name: alpacon-cli
    file_name_template: '{{ .PackageName }}_{{ trimprefix .Version "v" }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    maintainer: AlpacaX <support@alpacax.com>
    description: "Alpacon CLI"
    homepage: https://github.com/alpacax/alpacon-cli
    license: MIT
    vendor: AlpacaX
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin/

release:
  # Preserve the GitHub Release notes generated by the create-release job
  # in .github/workflows/release.yaml — goreleaser only uploads artifacts.
  mode: keep-existing

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"